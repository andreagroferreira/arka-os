# Skill provenance classification — the control that makes omission impossible.
#
# The parser (core/skills/provenance.py) closes every way of writing a
# BROKEN provenance block. It cannot see a skill that never writes one:
# absence reads as first-party, which is exactly what a forgotten port
# looks like. A parser is therefore the wrong place to close it.
#
# This file closes it. EVERY hand-authored SKILL.md in the repo must be
# CLASSIFIED — listed in `first_party` below, listed in `derived` below,
# or declaring `metadata.origin` in its own frontmatter. A skill in none
# of the three fails CI by name as `unclassified`.
# See tests/python/test_skill_provenance.py.
#
# Coverage is every authored surface, not just department sub-skills:
# department hubs (departments/<d>/SKILL.md), the orchestrator
# (arka/SKILL.md) and its meta skills (arka/skills/<s>/) are all here,
# because a port can land in any of them. The generated trees —
# plugins/ and marketplace/ — are deliberately NOT listed: they are
# emitted from departments/ by scripts/marketplace_gen.py and are
# already byte-drift-gated, so classifying the source classifies them.
#
# `first_party` is the baseline: the 275 skills that existed on the cut
# date, snapshotted once so they need no edits. It is a CLOSED set. Do
# not add to it — a new skill declares its origin in its own
# frontmatter, and a ported one lands in `derived` with its licence
# written down, in a diff, in front of a reviewer.
#
# What the baseline IS and IS NOT, stated plainly:
#
#   ASSERTED, not independently verified: that these 275 are ArkaOS
#   originals. Nobody re-derived each one from scratch to prove it.
#
#   PROVEN, for the lineage that matters: none of them can be derived
#   from an external source. `git log --diff-filter=A` puts every
#   creation between 2026-03-14 and 2026-07-13 — all of them before
#   2026-07-14, when this campaign began studying external repositories.
#   Zero exceptions.
#
#   The property the control actually rests on is neither: it is that
#   the set is CLOSED. Anything new must classify itself, whatever the
#   truth about the 275 turns out to be.
#
# Residual we accept, on the record: baseline trust is granted to a
# NAME. Gutting an existing skill and refilling it with someone else's
# content keeps the name and passes. Per-entry content hashes would
# close it and are refused — 275 live skills means every legitimate
# edit would red-line CI until someone regenerated the hash, and a hash
# people regenerate reflexively is theatre, not a control. The honest
# defence against a whole-body swap is a diff that visibly replaces an
# entire skill in front of a reviewer.
#
# Keys are repo-relative skill directory paths.
#
# derived format:
#   departments/<dept>/skills/<slug>:
#     origin: <lowercase-slug>      # e.g. vendor-derived, community
#     source: https://...           # where it came from
#     license: MIT                  # what we are bound by

baseline_date: 2026-07-14

