- id: sales-prospecting-06
  department: sales
  prompt: I have a list of 200 prospect emails from Apollo. How do I know which ones are deliverable
    before I start outreach?
  expected_properties:
  - Recommends Truelist for bulk validation
  - Explains email_state values (ok, email_invalid, risky, unknown, accept_all)
  - Warns Apollo accuracy is 60-80%
  - Cites 2% bounce rate threshold for reputation damage
  - 'Recommends workflow: validate, keep ok, exclude email_invalid'
  - Mentions Truelist MCP server for agent workflows
  - Mentions cold email reputation is hard to recover
  - References truelist.md or data-sources.md
  rubric: 'Should explain the deliverability validation step in Phase 3. Should recommend
    Truelist (the integration in this pack) for bulk validation. Should explain the email_state
    classification output: ok (deliverable), email_invalid (bounces, exclude), risky (deliverable
    with risk like role or disposable, include cautiously), unknown (couldn''t determine,
    skip or re-verify), accept_all (catch-all domain, include cautiously). Should warn that
    Apollo data accuracy is typically 60-80% — sending without validation will tank sender
    reputation (bounce rate >2% triggers ISP throttling and reputation damage). Should recommend
    the workflow: bulk POST to /api/v1/verify or CSV upload → keep ok, include risky/accept_all
    cautiously, exclude email_invalid, re-verify unknown → hand off to outreach. Should note
    Truelist also has an official MCP server for agent-driven validation. Should note cold
    email reputation is hard to recover once damaged — validation is non-negotiable, not optional.
    Should mention Hunter and Snov as alternatives with built-in verification. Should reference
    truelist.md integration guide.'
  tags:
  - prospecting
  - imported
- id: sales-prospecting-07
  department: sales
  prompt: I just built a tool that automates failed-payment follow-up for gym owners. I have
    no customers yet. Help me find my first ten — the people who are actually dealing with
    this problem right now.
  expected_properties:
  - Selects the Demand-signal branch, not the SMB/B2B/SaaS list-building branches
  - Mines the five signal buckets from public discourse rather than contact databases
  - Uses recency/original-source tooling (last30days, social-fetch, scraping) and does not
    qualify from snippets
  - Scores on the demand-fit rubric (0-100 weighted), not ICP-fit Hot/Warm/Cold
  - Requires a cited public signal for every primary-shortlist prospect
  - Drafts openers but never auto-sends; labels prospects as potential-based-on-public-signals
  - Produces the evidence report structure with a 7-day manual outreach plan and limits
  rubric: Should select the Demand-signal branch (early-stage, first customers, evidence-of-demand)
    and load references/demand-signals.md — NOT the SMB/B2B list-building branches. Should
    start with a product brief, then mine the five signal buckets (explicit demand / pain
    / workaround / switching / timing) across public discourse (forums, communities, reviews,
    GitHub issues, job posts) — using last30days for recency, social-fetch/scraping to read
    original pages, not qualifying from snippets. Should score prospects on demand-fit (pain
    25 / product fit 25 / timing 20 / reachability 15 / evidence quality 15, 0-100 with bands)
    rather than ICP-fit Hot/Warm/Cold, and require a cited public signal for every primary-shortlist
    prospect. Should draft source-based openers but never auto-send. Should produce an evidence
    report (verdict → ICP → top prospect → shortlist with sources+scores → repeated patterns
    → 7-day manual outreach plan → limits) and label prospects as 'potential customers based
    on public signals,' not confirmed buyers. Should honor the compliance guardrails including
    no data brokers/leaked data and no sensitive-trait targeting.
  tags:
  - prospecting
  - imported
