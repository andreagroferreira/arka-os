id: mission-activate
name: Activate Mission
description: >
  Owns the outcome "turn a new customer into an activated quick-win (48-72h)".
  Stream-aligned mission squad borrowing across saas, ecom, pm and brand.
  Shared metric: time-to-first-value + activation rate. Grounded in
  [[Retention Flywheel]] (onboarding → quick win) and [[Autonomia Por Missões (Não Departamentos)]].
department: cross-department
squad_type: project
topology: stream-aligned
max_size: 10
quality_gate_required: true

