id: mission-acquire
name: Acquire Mission
description: >
  Owns the outcome "turn a stranger into a qualified lead (SQL)" end-to-end.
  A stream-aligned mission squad (Autonomy by Missions, not Departments) that
  borrows members across marketing, sales and landing. Shared metric: qualified
  leads/month + MQL→SQL conversion. Grounded in [[Autonomia Por Missões (Não Departamentos)]].
department: cross-department
squad_type: project
topology: stream-aligned
max_size: 10
quality_gate_required: true

