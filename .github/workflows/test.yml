name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Core deps + dashboard extra (fastapi/uvicorn — the API endpoint
          # test modules import them at collection time) + sqlite-vec so the
          # vector-store test isn't skipped. fastembed/ingest extras stay out
          # (heavy; their code paths degrade gracefully and are covered by
          # the labeled-degradation tests).
          pip install -e ".[dashboard]" sqlite-vec
          # starlette's TestClient needs an httpx client lib: recent
          # starlette wants httpx2, older wants httpx — install whichever
          # resolves (httpx2 first, fallback httpx).
          pip install pytest pytest-cov
          pip install httpx2 || pip install httpx

      - name: Run Python tests
        # Coverage gate (constitution MUST rule: test-coverage >= 80%) runs
        # on one matrix leg only — a single source of truth avoids tripling
        # the flake surface on platform-dependent branches. Measured 80.44%
        # on core/ at gate introduction.
        run: |
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            python -m pytest tests/python/ -v --tb=short --cov=core --cov-report=term --cov-fail-under=80
          else
            python -m pytest tests/python/ -v --tb=short
          fi

      - name: Check test count
        run: |
          COUNT=$(python -m pytest tests/python/ --co -q 2>/dev/null | tail -1 | grep -o '[0-9]*')
          echo "Test count: $COUNT"
          if [ "$COUNT" -lt 500 ]; then
            echo "Warning: Expected 500+ tests, found $COUNT"
          fi

  bats-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Make scripts executable
        run: |
          find . -name "*.sh" -exec chmod +x {} \;
          find bin/ -type f -exec chmod +x {} \; 2>/dev/null || true

      - name: Run bats tests
        run: bats tests/bats/ 2>/dev/null || bats tests/ 2>/dev/null || echo "No bats tests found"

  node-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 18 = engines floor in package.json; 22 = newer Node LTS line above the floor.
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"

      - name: Check installer syntax
        run: node --check installer/cli.js

      - name: Install dev dependencies
        # Pinned, reproducible install from the committed lockfile — fails
        # closed on drift (supply-chain gate; only devDep is eslint).
        run: npm ci --no-audit --no-fund

      - name: Lint installer
        run: npm run lint

      - name: Run installer tests
        # The node --test glob form ("tests/installer/**/*.test.js") is
        # stable since Node 22.
        if: matrix.node-version == 22
        run: npm test

      - name: Runtime smoke (engines floor)
        # The 18 leg's other steps only parse/lint — they never execute
        # installer runtime code, so the engines>=18 promise was untested.
        # Import a real ESM module and CALL it against temp dirs: exercises
        # the function body (fs cpSync/chmod/mkdir), not just resolution.
        if: matrix.node-version == 18
        run: |
          node --input-type=module -e "
            import { mkdtempSync, mkdirSync, writeFileSync, existsSync } from 'node:fs';
            import { join } from 'node:path';
            import { tmpdir } from 'node:os';
            import { copyHookLib } from './installer/hook-lib.js';
            const src = mkdtempSync(join(tmpdir(), 'smoke-src-'));
            mkdirSync(join(src, '_lib'));
            writeFileSync(join(src, '_lib', 'x.sh'), '#!/usr/bin/env bash\n');
            const dest = mkdtempSync(join(tmpdir(), 'smoke-dest-'));
            if (copyHookLib(src, dest) !== true) { throw new Error('copyHookLib did not report success on Node 18'); }
            if (!existsSync(join(dest, '_lib', 'x.sh'))) { throw new Error('copyHookLib did not deploy _lib on Node 18'); }
            console.log('runtime smoke OK on', process.version);
          "

  skill-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate all skills
        run: python scripts/skill_validator.py departments/ --summary

  codespell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install codespell
        run: pip install codespell

      - name: Spellcheck code paths
        # English-primary paths only; departments/ and wiki/ carry pt-PT
        # content and proper nouns. False-positive lexicon in .codespellrc.
        run: codespell core/ installer/ scripts/ tests/
