name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Core deps + dashboard extra (fastapi/uvicorn — the API endpoint
          # test modules import them at collection time) + sqlite-vec so the
          # vector-store test isn't skipped + mcp so the arka-tools security
          # tests (OWASP LLM01) run everywhere. fastembed/ingest extras stay
          # out (heavy; their code paths degrade gracefully and are covered
          # by the labeled-degradation tests).
          pip install -e ".[dashboard,mcp]" sqlite-vec
          # starlette's TestClient needs an httpx client lib: recent
          # starlette wants httpx2, older wants httpx — install whichever
          # resolves (httpx2 first, fallback httpx).
          pip install pytest pytest-cov
          pip install httpx2 || pip install httpx

      - name: Run Python tests
        # Coverage gate (constitution MUST rule: test-coverage >= 80%) runs
        # on one matrix leg only — a single source of truth avoids tripling
        # the flake surface on platform-dependent branches. Measured 80.44%
        # on core/ at gate introduction.
        run: |
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            python -m pytest tests/python/ -v --tb=short --cov=core --cov-report=term --cov-fail-under=80
          else
            python -m pytest tests/python/ -v --tb=short
          fi

      - name: Check test count
        run: |
          COUNT=$(python -m pytest tests/python/ --co -q 2>/dev/null | tail -1 | grep -o '[0-9]*')
          echo "Test count: $COUNT"
          if [ "$COUNT" -lt 500 ]; then
            echo "Warning: Expected 500+ tests, found $COUNT"
          fi

  cross-platform-tests:
    # Additive parity baseline for macOS and Windows. Deliberately a SEPARATE
    # job rather than an `os` dimension on python-tests, so the existing
    # required checks `python-tests (3.11/3.12/3.13)` keep their exact names
    # and reporting — this PR changes nothing about the Linux path or branch
    # protection. Both legs REPORT rather than gate: the test step publishes
    # pass/fail counts to the run summary and exits 0, and continue-on-error
    # keeps even an infrastructure failure off the merge path. So the job can
    # never block master and never shows a permanent red check — the counts in
    # the summary are the signal. Promote a leg to gating in a focused
    # follow-up once its platform reaches zero failures. The Windows leg
    # carries known residual gaps (encoding, ConPTY tests needing pywinpty,
    # bash hooks); ~97% of the suite passes today.
    name: cross-platform-tests (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      # Never let one platform's failure cancel the other.
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # bash on every OS: windows-latest ships Git bash, so the same script
        # runs identically (avoids the default PowerShell shell on Windows).
        # On Windows `pip install -e .` also pulls pywinpty via its
        # `sys_platform == 'win32'` marker — no extra step needed.
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dashboard,mcp]" sqlite-vec
          pip install pytest pytest-cov
          pip install httpx2 || pip install httpx

      - name: Run Python tests (parity baseline)
        # No coverage gate here — that stays on the single ubuntu + 3.12 leg in
        # python-tests. Windows/macOS legitimately skip a few POSIX/PTY tests,
        # so their coverage is lower by design and must not gate the threshold.
        #
        # This step reports rather than gates: it always exits 0 and publishes
        # the pass/fail counts to the run summary. A check that is red by
        # design trains reviewers to ignore red, and this job is additive
        # information about a platform that has never been measured — not a
        # verdict on the change under review. The summary line is the signal.
        # Promote a leg to gating (drop this wrapper) in a focused follow-up
        # once its platform reaches zero failures.
        shell: bash
        run: |
          set +e
          python -m pytest tests/python/ -v --tb=short > pytest-output.txt 2>&1
          status=$?
          tail -n 40 pytest-output.txt
          {
            echo "### ${{ matrix.os }} / py${{ matrix.python-version }} — parity baseline"
            echo ""
            echo '```'
            grep -E "^(FAILED|ERROR)" pytest-output.txt | head -n 25
            tail -n 1 pytest-output.txt
            echo '```'
            echo ""
            echo "pytest exit status: ${status} — reported, not gated."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  bats-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install bats-core
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Install Python deps for hook/bridge tests
        # The synapse bridge (dept detection, L5 hints) and gateway-ensure
        # need pyyaml/pydantic. Must be SYSTEM-wide, not user-site: several
        # bats tests override HOME, which silently drops ~/.local from
        # sys.path and un-installs user-site packages mid-suite. Exposed
        # by the de-swallow.
        # --ignore-installed: pip cannot uninstall debian-managed dist-packages
        # (typing_extensions RECORD missing); overlay into /usr/local instead.
        run: sudo pip3 install --break-system-packages --ignore-installed pyyaml pydantic

      - name: Make scripts executable
        run: |
          find . -name "*.sh" -exec chmod +x {} \;
          find bin/ -type f -exec chmod +x {} \; 2>/dev/null || true

      - name: Run bats tests
        # No swallow (was `|| echo`): governance bats failures MUST fail CI.
        # Fixed 2026-07-09 after the Constitution 2.0 QG flagged that the
        # constitution's own tests were effectively unenforced.
        run: bats tests/

  node-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 18 = engines floor in package.json; 22 = newer Node LTS line above the floor.
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"

      - name: Check installer syntax
        run: node --check installer/cli.js

      - name: Install dev dependencies
        # Pinned, reproducible install from the committed lockfile — fails
        # closed on drift (supply-chain gate; only devDep is eslint).
        run: npm ci --no-audit --no-fund

      - name: Lint installer
        run: npm run lint

      - name: Run installer tests
        # The node --test glob form ("tests/installer/**/*.test.js") is
        # stable since Node 22.
        if: matrix.node-version == 22
        run: npm test

      - name: Run vendored archify tests (dev/diagram)
        # 44 payload test files kept on import (see docs/THIRD-PARTY-NOTICES.md,
        # archify section); zero-dependency, native node --test runner.
        if: matrix.node-version == 22
        working-directory: departments/dev/skills/diagram/vendor
        run: node --test test/*.test.mjs

      - name: Runtime smoke (engines floor)
        # The 18 leg's other steps only parse/lint — they never execute
        # installer runtime code, so the engines>=18 promise was untested.
        # Import a real ESM module and CALL it against temp dirs: exercises
        # the function body (fs cpSync/chmod/mkdir), not just resolution.
        if: matrix.node-version == 18
        run: |
          node --input-type=module -e "
            import { mkdtempSync, mkdirSync, writeFileSync, existsSync } from 'node:fs';
            import { join } from 'node:path';
            import { tmpdir } from 'node:os';
            import { copyHookLib } from './installer/hook-lib.js';
            const src = mkdtempSync(join(tmpdir(), 'smoke-src-'));
            mkdirSync(join(src, '_lib'));
            writeFileSync(join(src, '_lib', 'x.sh'), '#!/usr/bin/env bash\n');
            const dest = mkdtempSync(join(tmpdir(), 'smoke-dest-'));
            if (copyHookLib(src, dest) !== true) { throw new Error('copyHookLib did not report success on Node 18'); }
            if (!existsSync(join(dest, '_lib', 'x.sh'))) { throw new Error('copyHookLib did not deploy _lib on Node 18'); }
            console.log('runtime smoke OK on', process.version);
          "

  skill-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validator deps
        # skill_validator now scores provenance via core.skills.provenance,
        # which uses pydantic + pyyaml. Without these the validator import
        # fails (ModuleNotFoundError: yaml).
        run: pip install pyyaml pydantic

      - name: Validate all skills
        run: python scripts/skill_validator.py departments/ --summary

  codespell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install codespell
        run: pip install codespell

      - name: Spellcheck code paths
        # English-primary paths only; departments/ and wiki/ carry pt-PT
        # content and proper nouns. False-positive lexicon in .codespellrc.
        run: codespell core/ installer/ scripts/ tests/
