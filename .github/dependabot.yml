version: 2
updates:
  # Root npm surface (installer devDependency: eslint). The dashboard/ npm
  # surface is managed separately by dashboard/renovate.json, so it is not
  # scanned here. Weekly, grouped so a single PR carries all bumps.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-dev:
        patterns:
          - "*"
    ignore:
      # eslint >=10 requires Node >=20.19; our support matrix (and the CI
      # node-check job) still includes Node 18. Re-enable when Node 18 is
      # dropped from the matrix. Context: PR #243 (EBADENGINE on node 18).
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]

  # Python deps declared in pyproject.toml. Covers core [project.dependencies]
  # (pydantic, pyyaml, rich, click, jinja2) plus the optional extras
  # (fastapi/dashboard, fastembed/knowledge, …) under the same pip entry.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      pip:
        patterns:
          - "*"

  # GitHub Actions pinned by major (actions/checkout@v4, setup-node@v4, …).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
